# Note: do NOT commit `org.gradle.java.home` here — that pins the JDK
# path to a specific machine and breaks CI (the path won't exist on a
# GitHub Actions runner). Let Gradle pick up JAVA_HOME from the
# environment instead. On your own machine, set the JBR path via
# Android Studio's "Project Structure" or a shell env var if needed.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
